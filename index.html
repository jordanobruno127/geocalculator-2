<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт переехал — GeoCalculator.ru</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #2ecc71;
        }
        .icon {
            font-size: 48px;
            color: #2ecc71;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 15px 0;
            color: #1a252f;
            font-weight: 700;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 25px 0;
            color: #7f8c8d;
        }
        .btn {
            display: inline-block;
            background-color: #2ecc71;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .btn:hover {
            background-color: #27ae60;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🔄</div>
        <h1>Сайт переехал</h1>
        <p>Этот сайт больше не поддерживается. Для продолжения работы и получения актуальной информации, пожалуйста, перейдите на наш новый адрес.</p>
        <a href="https://geocalculator.ru" class="btn">Перейти на geocalculator.ru</a>
        <div class="footer">Вы будете перенаправлены автоматически через 10 секунд...</div>
    </div>

    <script>
        // Автоматический редирект через 10 секунд
        setTimeout(function() {
            window.location.href = "https://geocalculator.ru";
        }, 10000);
    </script>

</body>
</html>
