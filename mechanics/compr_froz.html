<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ступени нагрузки мерзлого грунта</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><g fill="none" stroke="%23002f4b" stroke-opacity="0.07" stroke-width="2"><circle cx="30" cy="40" r="9"/><circle cx="80" cy="90" r="7"/><circle cx="105" cy="50" r="8"/><path d="M50 75 L58 88 M42 82 L50 95" stroke-width="2.8"/><path d="M90 30 L98 45" stroke-width="2.2"/></g><g fill="%23e3f2fd" fill-opacity="0.09"><circle cx="20" cy="110" r="5"/><circle cx="75" cy="25" r="4"/></g></svg>');
            background-repeat: repeat;
            background-size: 140px;
            min-height: 100vh;
        }
        .top-menu {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .top-menu button {
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #2c3e50;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .top-menu button:hover {
            background-color: #34495e;
        }
        .header-text {
            max-width: 800px;
            margin: 0 auto 30px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .header-text h1 {
            font-size: 24px;
            color: #2c3e50;
        }
        .header-text p {
            font-size: 16px;
            color: #000000;
        }
        .method-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px auto;
            flex-wrap: wrap;
            max-width: 900px;
        }
        .action-btn {
            padding: 12px 24px;
            border-radius: 14px;
            border: 2px solid #2c3e50;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 220px;
        }
        .action-btn:hover {
            background-color: #34495e;
            border-color: #34495e;
        }
        .action-btn.active {
            background-color: #2c3e50;
            border-color: #2c3e50;
        }
        .action-btn.inactive {
            background-color: #7f8c8d;
            border-color: #7f8c8d;
        }
        .action-btn.inactive:hover {
            background-color: #95a5a6;
            border-color: #95a5a6;
        }
        .test-container {
            display: none;
            margin-top: 20px;
        }
        .test-container.active {
            display: block;
        }
        .calc-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 620px;
            margin: 0 auto;
        }
        .calculation-container {
            border: 2px solid #2c3e50;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: rgba(255,255,255,0.92);
            min-width: 500px;
            max-width: 620px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 14px;
            color: #2c3e50;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        .result-block {
            margin-top: 20px;
            padding: 15px;
            background: rgba(240,248,255,0.6);
            border: 1px solid #d0e0ff;
            border-radius: 10px;
        }
        .result-title {
            font-size: 16px;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .step-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px 10px;
        }
        .step-item {
            background: white;
            padding: 12px;
            border: 1px solid #a3c8ff;
            border-radius: 8px;
            text-align: center;
        }
        .step-item .step-num {
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
        }
        .step-item .value {
            font-size: 17px;
            font-weight: bold;
            color: #1a73e8;
        }
        .action-row {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn-calc-green {
            padding: 8px 20px;
            border-radius: 12px;
            border: 2px solid #2e7d32;
            background-color: #2e7d32;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            min-width: 140px;
        }
        .btn-calc-green:hover { background-color: #388e3c; }
        .btn-clear {
            padding: 8px 20px;
            border-radius: 12px;
            border: 1px solid #7f8c8d;
            background-color: #ecf0f1;
            color: #2c3e50;
            cursor: pointer;
            font-size: 15px;
            min-width: 140px;
        }
        .btn-clear:hover { background-color: #bdc3c7; }
        .error {
            color: #c62828;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        @media screen and (max-width: 768px) {
            body { padding-top: 60px; }
            .header-text { margin-top: 20px; }
            .method-buttons { flex-direction: column; align-items: center; }
            .action-btn { width: 90%; max-width: 340px; }
            .calc-wrapper { flex-direction: column; align-items: center; }
            .calculation-container { width: 100%; max-width: 90%; min-width: 320px; }
        }
    </style>
</head>
<body>

<div class="top-menu">
    <button onclick="location.href='https://geocalculator.ru/index.html'">🏠</button>
</div>

<div class="header-text">
    <h1><br>Ступени нагрузки при компрессионных испытаниях <br>мерзлых грунтов</h1>
    <p>Выберите режим ниже и введите данные для расчёта ступеней.</p>
</div>

<div class="method-buttons">
    <button class="action-btn" onclick="toggleTab('frozen')">Мерзлый грунт</button>
    <button class="action-btn" onclick="toggleTab('thaw')">Оттаивание</button>
</div>

<!-- Вкладка Мерзлый грунт -->
<div id="test-container-frozen" class="test-container">
    <div class="tests-container">
        <div class="test-flex">
            <div class="calc-wrapper">
                <div class="calculation-container">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Плотность грунта, г/см³</label>
                            <input type="number" id="density" step="0.01" min="0.1" onkeydown="handleEnter(event, this, 'frozen')">
                        </div>
                        <div class="form-group">
                            <label>Глубина залегания, м</label>
                            <input type="number" id="depth" step="0.1" min="0" onkeydown="handleEnter(event, this, 'frozen')">
                        </div>
                        <div class="form-group">
                            <label>Температура испытания, °C</label>
                            <select id="temp" onkeydown="handleEnter(event, this, 'frozen')">
                                <option value="-0.3">-0.3</option>
                                <option value="-0.5">-0.5</option>
                                <option value="-1">-1</option>
                                <option value="-1.5">-1.5</option>
                                <option value="-2">-2</option>
                                <option value="-2.5">-2.5</option>
                                <option value="-3">-3</option>
                                <option value="-3.5">-3.5</option>
                                <option value="-4">-4</option>
                                <option value="-6">-6</option>
                                <option value="-8">-8</option>
                                <option value="-10">-10</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Тип грунта</label>
                            <select id="soilType" onkeydown="handleEnter(event, this, 'frozen')">
                                <option value="пески средней">Пески средней крупности</option>
                                <option value="пески мелкие">Пески мелкие и пылеватые</option>
                                <option value="супеси">Супеси</option>
                                <option value="суглинки и глины">Суглинки и глины</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Льдистость, д.е.</label>
                            <input type="number" id="iceContent" step="0.01" min="0" max="1" onkeydown="handleEnter(event, this, 'frozen')">
                        </div>
                    </div>

                    <div class="error" id="errorMsgFrozen"></div>

                    <div class="result-block" id="resultBlockFrozen" style="display:none;">
                        <div class="result-title">Ступени нагрузки, МПа</div>
                        <div class="step-grid" id="stepsContainerFrozen"></div>
                    </div>

                    <div class="action-row">
                        <button class="btn-calc-green" onclick="calculateFrozen()">Рассчитать</button>
                        <button class="btn-clear" onclick="clearFrozen()">Очистить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Вкладка Оттаивание -->
<div id="test-container-thaw" class="test-container">
    <div class="tests-container">
        <div class="test-flex">
            <div class="calc-wrapper">
                <div class="calculation-container">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Тип грунта</label>
                            <select id="thawSoilType" onkeydown="handleEnter(event, this, 'thaw')">
                                <option value="глинистый">Глинистый</option>
                                <option value="песчаный">Песчаный</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>1-я ступень (из мерзлого испытания), МПа</label>
                            <input type="number" id="thawP1" step="0.001" min="0" onkeydown="handleEnter(event, this, 'thaw')">
                        </div>
                    </div>

                    <div class="error" id="errorMsgThaw"></div>

                    <div class="result-block" id="resultBlockThaw" style="display:none;">
                        <div class="result-title">Ступени нагрузки при оттаивании, МПа</div>
                        <div class="step-grid" id="stepsContainerThaw"></div>
                    </div>

                    <div class="action-row">
                        <button class="btn-calc-green" onclick="calculateThaw()">Рассчитать</button>
                        <button class="btn-clear" onclick="clearThaw()">Очистить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Переключение вкладок
function toggleTab(tab) {
    document.querySelectorAll('.action-btn').forEach(btn => {
        btn.classList.remove('active');
        btn.classList.add('inactive');
    });
    event.target.classList.remove('inactive');
    event.target.classList.add('active');

    document.querySelectorAll('.test-container').forEach(cont => cont.classList.remove('active'));
    document.getElementById(`test-container-${tab}`).classList.add('active');
}

// Обработка Enter — переход фокуса или расчёт
function handleEnter(e, element, tab) {
    if (e.key === 'Enter') {
        e.preventDefault();

        const form = element.closest('.form-grid');
        const inputs = Array.from(form.querySelectorAll('input, select'));
        const currentIndex = inputs.indexOf(element);

        // Если это последнее поле — запускаем расчёт
        if (currentIndex === inputs.length - 1) {
            if (tab === 'frozen') {
                calculateFrozen();
            } else if (tab === 'thaw') {
                calculateThaw();
            }
        } else {
            // Переход к следующему полю
            inputs[currentIndex + 1].focus();
        }
    }
}

// Мерзлый грунт (без изменений в логике)
function clearFrozen() {
    document.getElementById('density').value = '';
    document.getElementById('depth').value = '';
    document.getElementById('iceContent').value = '';
    document.getElementById('temp').value = '';
    document.getElementById('soilType').value = '';
    document.getElementById('resultBlockFrozen').style.display = 'none';
    document.getElementById('errorMsgFrozen').textContent = '';
}

function calculateFrozen() {
    const density = parseFloat(document.getElementById('density').value);
    const depth   = parseFloat(document.getElementById('depth').value);
    const temp    = document.getElementById('temp').value;
    const ice     = parseFloat(document.getElementById('iceContent').value);
    const soil    = document.getElementById('soilType').value;

    const err = document.getElementById('errorMsgFrozen');
    err.textContent = '';

    if (isNaN(density) || isNaN(depth) || isNaN(ice) || !temp || !soil) {
        err.textContent = 'Заполните все поля';
        return;
    }

    let p1_raw = (density * depth) / 100;
    let p1 = p1_raw;
    const isSandy = soil.includes('пески средней') || soil.includes('пески мелкие');

    if (isSandy) {
        if (p1_raw > 0.100) p1 = 0.100;
    } else {
        if (p1_raw > 0.050) p1 = 0.050;
    }

    const table = {
        '<0.2': {
            'пески средней':    {'-0.3':0.55,'-0.5':0.95,'-1':1.25,'-1.5':1.45,'-2':1.6,'-2.5':1.8,'-3':1.95,'-3.5':2,'-4':2.2,'-6':2.6,'-8':2.95,'-10':3.3},
            'пески мелкие':     {'-0.3':0.45,'-0.5':0.7,'-1':0.9,'-1.5':1.1,'-2':1.3,'-2.5':1.4,'-3':1.6,'-3.5':1.7,'-4':1.8,'-6':2.2,'-8':2.55,'-10':2.86},
            'супеси':           {'-0.3':0.3,'-0.5':0.5,'-1':0.7,'-1.5':0.8,'-2':1.05,'-2.5':1.15,'-3':1.3,'-3.5':1.4,'-4':1.5,'-6':1.9,'-8':2.25,'-10':2.5},
            'суглинки и глины': {'-0.3':0.25,'-0.5':0.45,'-1':0.55,'-1.5':0.65,'-2':0.8,'-2.5':0.9,'-3':1,'-3.5':1.1,'-4':1.2,'-6':1.55,'-8':1.9,'-10':2.2}
        },
        '>=0.2': { any: {'-0.3':0.2,'-0.5':0.3,'-1':0.4,'-1.5':0.5,'-2':0.6,'-2.5':0.7,'-3':0.75,'-3.5':0.85,'-4':0.95,'-6':1.25,'-8':1.55,'-10':1.75} }
    };

    let k6 = 0.4;
    const key = ice < 0.2 ? '<0.2' : '>=0.2';
    const cat = key === '<0.2' ? soil : 'any';
    k6 = table[key]?.[cat]?.[temp] ?? table[key]?.any?.[temp] ?? 0.4;
    const p6 = k6;

    const steps = [];
    for (let i = 1; i <= 6; i++) {
        if (i === 1) steps.push(p1);
        else if (i === 6) steps.push(p6);
        else steps.push(p1 + (p6 - p1) * (i-1)/5);
    }

    const container = document.getElementById('stepsContainerFrozen');
    container.innerHTML = '';
    steps.forEach((v,i) => {
        const div = document.createElement('div');
        div.className = 'step-item';
        div.innerHTML = `<div class="step-num">Ступень ${i+1}</div><div class="value">${v.toFixed(3)} МПа</div>`;
        container.appendChild(div);
    });
    document.getElementById('resultBlockFrozen').style.display = 'block';
}

// Оттаивание
function clearThaw() {
    document.getElementById('thawP1').value = '';
    document.getElementById('errorMsgThaw').textContent = '';
    document.getElementById('resultBlockThaw').style.display = 'none';
}

function calculateThaw() {
    const p1   = parseFloat(document.getElementById('thawP1').value);
    const type = document.getElementById('thawSoilType').value;

    const err = document.getElementById('errorMsgThaw');
    err.textContent = '';

    if (isNaN(p1) || p1 < 0 || !type) {
        err.textContent = 'Заполните оба поля корректно';
        return;
    }

    const maxP1 = type === 'глинистый' ? 0.050 : 0.100;

    if (p1 > maxP1) {
        err.textContent = `Для ${type === 'глинистый' ? 'глинистого' : 'песчаного'} грунта 1-я ступень не может превышать ${maxP1.toFixed(3)} МПа`;
        document.getElementById('resultBlockThaw').style.display = 'none';
        return;
    }

    const p6 = type === 'глинистый' ? 0.300 : 0.500;

    const steps = [p1];
    for (let i = 2; i <= 5; i++) {
        const t = (i - 1) / 5;
        const val = p1 + (p6 - p1) * t;
        steps.push(val);
    }
    steps.push(p6);

    const container = document.getElementById('stepsContainerThaw');
    container.innerHTML = '';
    steps.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = 'step-item';
        div.innerHTML = `<div class="step-num">Ступень ${i+1}</div><div class="value">${v.toFixed(3)} МПа</div>`;
        container.appendChild(div);
    });
    document.getElementById('resultBlockThaw').style.display = 'block';
}
</script>
</body>
</html>
